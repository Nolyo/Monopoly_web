<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monopoly 3D</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎩</text></svg>" />
  <link rel="stylesheet" href="./src/ui/styles.css" />
</head>
<body>
  <div id="app"></div>

  <div id="hud" class="hidden">
    <div id="turn-banner"></div>
    <div id="pot-badge" class="hidden" title="Cagnotte du Parc Gratuit"></div>
    <div id="players"></div>
    <div id="log-wrap">
      <div id="log-title">Journal</div>
      <div id="log"></div>
    </div>
    <div id="actions"></div>
    <div id="bottom-right">
      <div id="ctrl-row">
        <button id="mute-btn" title="Couper / rétablir le son">🔊</button>
        <label id="speed-label">Vitesse
          <select id="speed">
            <option value="1">×1</option>
            <option value="2">×2</option>
            <option value="3">×3</option>
          </select>
        </label>
      </div>
      <div id="hint">🖱️ Glissez pour tourner la caméra · molette pour zoomer · cliquez sur une case pour voir son titre</div>
    </div>
  </div>

  <div id="toast-root"></div>
  <div id="modal-root"></div>

  <div id="setup">
    <div class="setup-box">
      <h1 class="logo">MONOPOLY<span> 3D</span></h1>
      <p class="tagline">Jouez contre des IA ou entre amis, sur le même appareil.</p>
      <div id="resume-box" class="hidden">
        <h2>📂 Partie en cours</h2>
        <div class="resume-meta"></div>
        <div class="resume-players"></div>
        <button id="resume-btn" class="action-btn primary big">▶ Reprendre la partie</button>
      </div>
      <div class="setup-row">
        <label>Nombre de joueurs</label>
        <div id="count-buttons"></div>
      </div>
      <div id="player-rows"></div>
      <div id="rules-box">
        <div class="rules-title">🏠 Règles maison</div>
        <label class="rule-row"><input type="checkbox" id="rule-double-go" /><span>💰 Double salaire si arrêt pile sur Départ</span></label>
        <label class="rule-row"><input type="checkbox" id="rule-parking-pot" /><span>🅿️ Cagnotte du Parc Gratuit</span></label>
        <label class="rule-row"><input type="checkbox" id="rule-auctions" checked /><span>🔨 Enchères en cas de refus d'achat</span></label>
        <label class="rule-row"><span>💵 Argent de départ</span><select id="rule-starting-money"></select></label>
      </div>
      <button id="start-btn" class="action-btn primary big">🎲 Commencer la partie</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
